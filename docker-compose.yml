services:
  app:
    build: .
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docs/operations/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build: .
    command: php artisan queue:work --sleep=3 --tries=3
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  scheduler:
    build: .
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: manzomaerp
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

volumes:
  mysql-data:
